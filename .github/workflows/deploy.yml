name: Deploy

on:
  push:
    tags:
      - 'v*-app'
      - 'v*-api'

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy web app
    if: endsWith(github.ref_name, '-app')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: deploy-web-production
      cancel-in-progress: false
    environment:
      name: production-web
      url: https://steexp.com
    steps:
      - name: Log trigger context
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Tag:   $TAG"
          echo "SHA:   $SHA"
          echo "Actor: $ACTOR"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: >-
            pages deploy ./build/client
            --project-name=stellarexplorer
            --branch=master

      - name: Smoke test web
        run: |
          for i in 1 2 3 4 5 6; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' https://steexp.com || true)"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "steexp.com returned HTTP $code"
          exit 1

  deploy-api:
    name: Deploy API
    if: endsWith(github.ref_name, '-api')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: deploy-api-production
      cancel-in-progress: false
    environment:
      name: production-api
      url: https://steexp-api.fly.dev
    steps:
      - name: Log trigger context
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Tag:   $TAG"
          echo "SHA:   $SHA"
          echo "Actor: $ACTOR"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install API dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace
        working-directory: api

      - name: Audit production API dependencies
        run: pnpm audit --prod --ignore-workspace
        working-directory: api

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Verify Fly.io authentication
        run: flyctl auth whoami
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app steexp-api
        working-directory: api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test API
        run: |
          for i in 1 2 3 4 5 6; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' https://steexp-api.fly.dev || true)"
            if [ "$code" = "200" ] || [ "$code" = "404" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "steexp-api.fly.dev returned HTTP $code"
          exit 1
